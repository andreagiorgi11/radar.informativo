name: Radar Informativo

on:
  schedule:
    - cron: '17 11 * * *'
    - cron: '17 23 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Node.js (JS runtime per yt-dlp)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Prepare YouTube cookies (optional)
        env:
          YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
        run: |
          if [ -n "$YTDLP_COOKIES_TXT" ]; then
            printf "%s" "$YTDLP_COOKIES_TXT" > /tmp/yt_cookies.txt
            echo "YTDLP_COOKIES_PATH=/tmp/yt_cookies.txt" >> $GITHUB_ENV
            echo "[OK] Cookies YouTube caricate"
          else
            echo "[WARN] Secret YTDLP_COOKIES_TXT assente: provo senza cookies"
          fi

      - name: Validate feeds
        run: python scripts/validate_feeds.py

      - name: Test yt-dlp
        run: |
          pip install yt-dlp
          yt-dlp --version
          EXTRA=""
          if [ -n "$YTDLP_COOKIES_PATH" ]; then
            EXTRA="--cookies $YTDLP_COOKIES_PATH"
          fi
          yt-dlp --js-runtimes node --write-auto-sub --skip-download --sub-lang it,en \
            --output "/tmp/test_transcript" \
            $EXTRA \
            "https://www.youtube.com/watch?v=6AWqgLu85Wc" 2>&1
          ls /tmp/test_transcript* 2>&1 || echo "Nessun file generato"

      - name: Run radar script
        env:
          RUN_LABEL: ${{ github.event.schedule == '17 11 * * *' && 'MEZZOGIORNO' || github.event.schedule == '17 23 * * *' && 'MEZZANOTTE' || 'MANUALE' }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python scripts/radar.py

      - name: Commit output to repository
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Radar run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
